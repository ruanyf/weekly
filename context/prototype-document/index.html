<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Web 原型 - 首页</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="home">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="index.html" aria-label="Weekly Web 首页">
        <span class="brand__mark">W</span>
        <span>Weekly Web</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="nav__link" data-nav="home" href="index.html">首页</a>
        <a class="nav__link" data-nav="detail" href="issue-detail.html">周刊</a>
        <a class="nav__link" data-nav="search" href="search.html">搜索</a>
        <a class="nav__link" data-nav="user" href="user-center.html">个人</a>
      </nav>
      <select class="theme-select" data-theme-select aria-label="主题模式">
        <option value="system">系统</option>
        <option value="light">浅色</option>
        <option value="dark">深色</option>
      </select>
    </div>
  </header>

  <main class="page home-page">
    <section class="home-hero" aria-labelledby="home-title">
      <p class="eyebrow">Weekly Web</p>
      <h1 id="home-title">科技周刊，安静地读。</h1>
      <p class="lead">保留最新一期和搜索入口，让阅读从一个清晰动作开始。</p>
      <form class="search-box search-box--large" data-global-search role="search">
        <span class="search-box__icon">⌕</span>
        <input name="q" type="search" placeholder="搜索 AI、开源、rsync..." aria-label="搜索周刊内容">
        <button class="primary-button" type="submit">搜索</button>
      </form>
    </section>

    <section class="latest-minimal" data-latest-issue aria-label="最新一期周刊"></section>
  </main>
</body>
</html>
