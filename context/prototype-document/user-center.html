<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Web 原型 - 个人中心</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="user">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="index.html" aria-label="Weekly Web 首页">
        <span class="brand__mark">W</span>
        <span>Weekly Web</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="nav__link" data-nav="home" href="index.html">首页</a>
        <a class="nav__link" data-nav="detail" href="issue-detail.html">周刊</a>
        <a class="nav__link" data-nav="search" href="search.html">搜索</a>
        <a class="nav__link" data-nav="user" href="user-center.html">个人</a>
      </nav>
      <select class="theme-select" data-theme-select aria-label="主题模式">
        <option value="system">系统</option>
        <option value="light">浅色</option>
        <option value="dark">深色</option>
      </select>
    </div>
  </header>

  <main class="page">
    <section class="simple-hero">
      <p class="eyebrow">Profile</p>
      <h1>个人中心</h1>
      <p class="lead">最近阅读、收藏和主题设置只在登录后展示。</p>
    </section>

    <section class="section locked-state is-hidden" data-user-locked>
      <h2>请登录</h2>
      <p>登录后同步最近阅读和收藏。</p>
      <button class="primary-button" data-login-trigger data-login-reason="登录后查看最近阅读、收藏列表和主题同步设置。" type="button">登录</button>
    </section>

    <section class="section user-layout is-hidden" data-user-content>
      <aside class="panel panel--plain profile-block">
        <div class="avatar">WW</div>
        <div>
          <h2 data-profile-name>Reader</h2>
          <p class="muted">来自 <span data-profile-provider>GitHub</span></p>
        </div>
        <button class="ghost-button" data-logout type="button">退出</button>
      </aside>

      <div class="panel panel--plain">
        <div class="tabs" role="tablist">
          <button class="tab-button" data-tab-button="history" type="button">最近阅读</button>
          <button class="tab-button" data-tab-button="favorites" type="button">收藏</button>
          <button class="tab-button" data-tab-button="settings" type="button">设置</button>
        </div>

        <section data-tab-panel="history">
          <div class="section__header section__header--simple">
            <h2>最近阅读</h2>
          </div>
          <div class="list" data-history-list></div>
        </section>

        <section class="is-hidden" data-tab-panel="favorites">
          <div class="section__header section__header--simple">
            <h2>收藏</h2>
          </div>
          <div class="list" data-favorite-list></div>
        </section>

        <section class="is-hidden" data-tab-panel="settings">
          <div class="section__header section__header--simple">
            <h2>设置</h2>
          </div>
          <div class="settings-grid">
            <div class="setting-row">
              <div>
                <h3>主题模式</h3>
                <p class="micro">浅色、深色、跟随系统。</p>
              </div>
              <div class="segmented" aria-label="主题模式">
                <button class="segmented__button" data-theme-choice="light" type="button">浅色</button>
                <button class="segmented__button" data-theme-choice="dark" type="button">深色</button>
                <button class="segmented__button" data-theme-choice="system" type="button">系统</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
