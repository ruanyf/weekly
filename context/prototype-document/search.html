<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Web 原型 - 搜索</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="search">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="index.html" aria-label="Weekly Web 首页">
        <span class="brand__mark">W</span>
        <span>Weekly Web</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="nav__link" data-nav="home" href="index.html">首页</a>
        <a class="nav__link" data-nav="detail" href="issue-detail.html">周刊</a>
        <a class="nav__link" data-nav="search" href="search.html">搜索</a>
        <a class="nav__link" data-nav="user" href="user-center.html">个人</a>
      </nav>
      <select class="theme-select" data-theme-select aria-label="主题模式">
        <option value="system">系统</option>
        <option value="light">浅色</option>
        <option value="dark">深色</option>
      </select>
    </div>
  </header>

  <main class="page page--narrow">
    <section class="simple-hero">
      <p class="eyebrow">Search</p>
      <h1>搜索周刊</h1>
      <form class="search-box search-box--large" data-search-form role="search">
        <span class="search-box__icon">⌕</span>
        <input data-search-input name="q" type="search" placeholder="输入关键词" aria-label="搜索关键词">
        <button class="primary-button" type="submit">搜索</button>
      </form>
    </section>

    <section class="section" aria-labelledby="search-result-title">
      <div class="section__header section__header--simple">
        <h2 id="search-result-title">结果</h2>
        <span class="micro" data-search-count>输入关键词后搜索</span>
      </div>
      <div class="result-list" data-search-results></div>
    </section>
  </main>
</body>
</html>
