<!DOCTYPE html>
<html lang="zh-CN" data-scroll-behavior="smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Web — 科技爱好者周刊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;650;700&display=swap" rel="stylesheet">
  <style>
    :root { --font-sans: "Geist", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    html[data-theme="dark"] { --font-sans: "Geist", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  </style>
  <link rel="stylesheet" href="assets/styles.css">
  <script>
    try {
      const mode = localStorage.getItem("weeklyWebTheme") || "system";
      const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = mode === "system" && dark ? "dark" : mode;
    } catch (e) {}
  </script>
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/" aria-label="Weekly Web 首页">
        <span class="brand__mark">W</span>
        <span>Weekly</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a class="nav__link is-active" href="/">首页</a>
        <a class="nav__link" href="/issues/400">周刊</a>
        <a class="nav__link" href="/search">搜索</a>
      </nav>
      <select class="nav__link" id="theme-select" style="border:0;cursor:pointer;appearance:auto;padding:0 10px;" aria-label="主题模式">
        <option value="system">系统</option>
        <option value="light">浅色</option>
        <option value="dark">深色</option>
      </select>
    </div>
  </header>

  <main class="page">

    <section class="home-hero">
      <h1>这一周，科技世界发生了什么。</h1>

      <form class="search-box" role="search" action="/search" method="get">
        <span class="search-box__icon" aria-hidden="true">⌕</span>
        <input type="search" name="q" placeholder="搜索 AI、开源、rsync…" aria-label="搜索周刊内容">
        <button type="submit">搜索</button>
      </form>
    </section>

    <a class="latest-card" href="/issues/400" aria-label="阅读第 400 期：rsync 的争论">
      <div class="latest-card__media">
        <img src="https://cdn.beekka.com/blogimg/asset/202606/bg2026060505.webp" alt="第 400 期封面图" loading="lazy">
      </div>
      <div class="latest-card__body">
        <p class="eyebrow">最新一期 · 2026 年 6 月</p>
        <h2>rsync 的争论</h2>
        <p>上海体育学院内的绿瓦书店，是上海首家体育主题书店。中庭有13米高的"明月山"，四周是小路，意为"书山有路勤为径"。</p>
        <span class="inline-link">
          开始阅读
          <span class="inline-link__arrow" aria-hidden="true">→</span>
        </span>
      </div>
    </a>

  </main>

  <script src="assets/app.js"></script>
</body>
</html>
